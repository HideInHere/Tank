version: "3.9"

# ============================================================
# Tank Trading System — Full Stack
# Services: openclaw gateway, 24 microservices, 8 postgres DBs,
#           redis, prometheus, grafana, alertmanager, unleash
# ============================================================

x-svc-defaults: &svc-defaults
  restart: unless-stopped
  networks:
    - tank_trading-internal
  logging:
    driver: json-file
    options:
      max-size: "20m"
      max-file: "5"

x-postgres-env: &postgres-env
  POSTGRES_USER: ${POSTGRES_USER:-tank}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_postgres}
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"

x-redis-env: &redis-env
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme_redis}

x-common-env: &common-env
  POSTGRES_USER: ${POSTGRES_USER:-tank}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_postgres}
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme_redis}
  TZ: ${TZ:-UTC}
  TRADING_ENV: ${TRADING_ENV:-production}
  OPENCLAW_URL: http://openclaw-gateway:18789
  UNLEASH_URL: http://unleash:4242/api

networks:
  tank_trading-internal:
    external: true

volumes:
  postgres-data:
  postgres-swarm-data:
  redis-data:
  prometheus-data:
  grafana-data:
  alertmanager-data:
  unleash-data:
  backup-data:
  n8n-data:

# ── Infrastructure ─────────────────────────────────────────

services:

  tank-openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: tank-openclaw
    restart: unless-stopped
    networks:
      - tank_trading-internal
    ports:
      - "18789:18789"
    volumes:
      - ./SOUL.md:/app/SOUL.md:ro
      - ./IDENTITY.md:/app/IDENTITY.md:ro
      - ./TOOLS.md:/app/TOOLS.md:ro
      - ./AGENTS.md:/app/AGENTS.md:ro
      - ./memory:/app/memory:rw
      - ~/.openclaw:/home/node/.openclaw:rw
    environment:
      OPENCLAW_MODE: local
      OPENCLAW_BIND: lan
      OPENCLAW_GATEWAY_PORT: "18789"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_API_KEY_ALT: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${ANTHROPIC_API_KEY}
      TZ: ${TZ:-UTC}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  banks-openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: banks-openclaw
    restart: unless-stopped
    networks:
      - tank_trading-internal
    ports:
      - "18790:18789"
    volumes:
      - ./BANKS.md:/app/BANKS.md:ro
      - ./TOOLS.md:/app/TOOLS.md:ro
      - ./memory:/app/memory:rw
      - ~/.openclaw:/home/node/.openclaw:rw
    environment:
      OPENCLAW_MODE: local
      OPENCLAW_BIND: lan
      OPENCLAW_GATEWAY_PORT: "18789"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_API_KEY_ALT: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${ANTHROPIC_API_KEY}
      TZ: ${TZ:-UTC}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  swarm-orchestrator:
    <<: *svc-defaults
    build:
      context: ./services/swarm-orchestrator
      dockerfile: Dockerfile
    container_name: swarm-orchestrator
    image: tank-swarm-orchestrator
    ports:
      - "5696:5696"
    environment:
      <<: *common-env
      POSTGRES_DB: swarm_db
      POSTGRES_HOST: postgres-swarm
      SWARM_DB_HOST: postgres-swarm
      SWARM_DB_NAME: swarm_db
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      postgres-swarm:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5696/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  postgres-swarm:
    <<: *svc-defaults
    image: postgres:16-alpine
    container_name: postgres-swarm
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tank}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_postgres}
      POSTGRES_DB: swarm_db
    volumes:
      - postgres-swarm-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tank}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  postgres:
    <<: *svc-defaults
    image: postgres:16-alpine
    container_name: tank-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tank}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_postgres}
      POSTGRES_DB: tank
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init-dbs.sh:/docker-entrypoint-initdb.d/init-dbs.sh:ro
      - ./infra/postgres/init-scripts:/docker-entrypoint-initdb.d/init-scripts:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tank}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    <<: *svc-defaults
    image: redis:7-alpine
    container_name: tank-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme_redis}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# ── Openclaw Gateway ───────────────────────────────────────

  openclaw-gateway:
    <<: *svc-defaults
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: openclaw-gateway
    image: tank/openclaw-gateway:latest
    environment:
      <<: *common-env
      OPENCLAW_PORT: "18789"
      OPENCLAW_SECRET: ${OPENCLAW_SECRET:-changeme_openclaw_secret}
      OPENCLAW_ADMIN_TOKEN: ${OPENCLAW_ADMIN_TOKEN:-changeme_admin_token}
      TANK_AGENT_URL: http://tank-agent:9000
    ports:
      - "18789:18789"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:18789/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  tank-agent:
    <<: *svc-defaults
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tank-agent
    image: tank/tank-agent:latest
    environment:
      <<: *common-env
      TANK_AGENT_ID: ${TANK_AGENT_ID:-tank-agent-001}
      TANK_AGENT_MODE: ${TANK_AGENT_MODE:-persistent}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-6}
      OPENCLAW_URL: http://openclaw-gateway:18789
      OPENCLAW_SECRET: ${OPENCLAW_SECRET:-changeme_openclaw_secret}
    depends_on:
      openclaw-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# ── Trading Microservices (24) ─────────────────────────────

  api-proxy:
    <<: *svc-defaults
    build: { context: ./services/api-proxy }
    container_name: tank-api-proxy
    environment:
      <<: *common-env
      SERVICE_NAME: api-proxy
      SERVICE_PORT: "8001"
    ports: ["127.0.0.1:8001:8001"]
    depends_on: &svc-deps
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    healthcheck: &svc-health
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 20s
      timeout: 5s
      retries: 5

  research:
    <<: *svc-defaults
    build: { context: ./services/research }
    container_name: tank-research
    environment:
      <<: *common-env
      SERVICE_NAME: research
      SERVICE_PORT: "8002"
      DB_NAME: research
    ports: ["127.0.0.1:8002:8002"]
    depends_on: *svc-deps
    healthcheck:
      <<: *svc-health
      test: ["CMD", "curl", "-sf", "http://localhost:8002/health"]

  decision:
    <<: *svc-defaults
    build: { context: ./services/decision }
    container_name: tank-decision
    environment:
      <<: *common-env
      SERVICE_NAME: decision
      SERVICE_PORT: "8003"
      DB_NAME: decision
    ports: ["127.0.0.1:8003:8003"]
    depends_on: *svc-deps
    healthcheck:
      <<: *svc-health
      test: ["CMD", "curl", "-sf", "http://localhost:8003/health"]

  executor:
