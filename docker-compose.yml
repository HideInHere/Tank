  risk-manager:
    <<: *svc-defaults
    build: { context: ./services/risk-manager }
    container_name: tank-risk-manager
    environment:
      <<: *common-env
      SERVICE_NAME: risk-manager
      SERVICE_PORT: "8011"
      DB_NAME: tank
      RISK_MAX_POSITION_SIZE: ${RISK_MAX_POSITION_SIZE:-10000}
      RISK_MAX_DAILY_LOSS: ${RISK_MAX_DAILY_LOSS:-5000}
      RISK_MAX_DRAWDOWN_PCT: ${RISK_MAX_DRAWDOWN_PCT:-15}
    ports: ["127.0.0.1:8011:8011"]
    depends_on: *svc-deps
    healthcheck:
      <<: *svc-health
      test: ["CMD", "curl", "-sf", "http://localhost:8011/health"]

  portfolio-tracker:
    <<: *svc-defaults
    build: { context: ./services/portfolio-tracker }
    container_name: tank-portfolio-tracker
    environment:
