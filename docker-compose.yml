  position-manager:
    <<: *svc-defaults
    build: { context: ./services/position-manager }
    container_name: tank-position-manager
    environment:
      <<: *common-env
      SERVICE_NAME: position-manager
      SERVICE_PORT: "8016"
      DB_NAME: ledger
    ports: ["127.0.0.1:8016:8016"]
    depends_on: *svc-deps
    healthcheck:
