  monitor:
    <<: *svc-defaults
    build: { context: ./services/monitor }
    container_name: tank-monitor
    environment:
      <<: *common-env
      SERVICE_NAME: monitor
      SERVICE_PORT: "8007"
      DB_NAME: tank
    ports: ["127.0.0.1:8007:8007"]
    depends_on: *svc-deps
    healthcheck:
      <<: *svc-health
