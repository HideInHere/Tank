    build: { context: ./services/ledger }
    container_name: tank-ledger
    environment:
      <<: *common-env
      SERVICE_NAME: ledger
      SERVICE_PORT: "8005"
      DB_NAME: ledger
    ports: ["127.0.0.1:8005:8005"]
    depends_on: *svc-deps
    healthcheck:
      <<: *svc-health
      test: ["CMD", "curl", "-sf", "http://localhost:8005/health"]

  tournament:
    <<: *svc-defaults
